name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install development dependencies
        run: npm ci

      - name: Validate syntax and run pure tests with Fengari
        run: npm test

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install --yes lua5.1

      - name: Run pure tests on Lua 5.1
        run: npm run test:lua51

      - name: Validate the installable package
        shell: pwsh
        run: ./scripts/validate-package.ps1
